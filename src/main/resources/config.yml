# ===============================
# EnthusiaTeleport - config.yml
# ===============================

teleport:
  # Warmup before normal teleports complete.
  warmup-seconds: 5.0

  # Cooldown after a normal teleport completes.
  cooldown-seconds: 60

  # How long /tpa requests stay active.
  request-expiry-seconds: 60

  # Radius used when searching around an unsafe target location.
  safe-search-radius: 4

  # How many /back locations are kept per player in memory.
  back-max: 10

  # Worlds that normal teleports are not allowed to enter unless bypassed.
  blocked-target-worlds:
    - surfevents

combat:
  enabled: true

  # Seconds after dealing or taking player damage that teleports are blocked.
  tag-seconds: 30

homes:
  default-max: 2

  # Highest matching value wins.
  rank-limits:
    enthusia.homes.5: 5
    enthusia.homes.10: 10
    enthusia.homes.20: 20

spawn:
  # If false, /spawn and spawn-based fallbacks use the world's normal spawn instead of the coordinates below.
  use-configured-spawn: true
  world: world
  x: 0.5
  y: 85.5
  z: 0.5
  center-on-block: true
  yaw: 0.0
  pitch: 0.0

  first-join:
    # Teleport players to spawn when they join for the first time.
    teleport-to-spawn: true

    # Also set their bed spawn to the spawn location on first join.
    set-bed-spawn: true

    starter-kit:
      enabled: true

      # If true, clear the player's inventory before giving the starter kit.
      clear-inventory: false

      # Items given on first join. Invalid materials are skipped with a warning.
      items:
        - material: COOKED_BEEF
          amount: 8
        - material: STONE_SWORD
          amount: 1
        - material: STONE_AXE
          amount: 1
        - material: STONE_SHOVEL
          amount: 1
        - material: STONE_PICKAXE
          amount: 1

  respawn:
    # If true, respawns are forced to the plugin spawn location.
    override-to-configured-spawn: true

rtp:
  enabled: true
  world: world

  # Random X/Z bounds.
  min-x: -7500
  max-x: 7500
  min-z: -7500
  max-z: 7500

  # Default number of /rtp uses. 0 means none unless a rank permission grants more.
  max-uses-default: 0

  rank-limits:
    enthusia.rtp.10: 10
    enthusia.rtp.20: 20
    enthusia.rtp.unlimited: -1

  # How many random locations to test before giving up.
  max-attempts: 30
